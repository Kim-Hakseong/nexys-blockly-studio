[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "nexys-sdk"
version = "0.1.0"
description = "Runtime SDK for code generated by Nexys Blockly Studio (sim + NI backends)"
readme = "README.md"
requires-python = ">=3.8"
authors = [{ name = "Nexys" }]
license = { text = "MIT" }
dependencies = []   # core (sim + TDMS writer) is pure stdlib

[project.optional-dependencies]
ni = ["nidaqmx>=0.6"]                 # real NI hardware
mqtt = ["paho-mqtt>=1.6"]             # real MQTT publish
read = ["npTDMS>=1.6"]               # to read produced .tdms files
dev = ["pytest>=7", "npTDMS>=1.6"]

[tool.setuptools.packages.find]
include = ["nexys*"]
